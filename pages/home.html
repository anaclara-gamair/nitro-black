<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nitro Black - Home</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="../css/home.css">
  <style>
    select { height: 60px; border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; background: rgba(255,255,255,0.05); color: white; padding: 0 20px; outline: none; width: 100%; }
    select option { background: #07000f; color: white; }
  </style>
</head>
<body>

  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <header class="header">
    <div class="logo">Nitro<span>Black</span></div>
    <nav class="nav">
      <a href="#">Home</a>
      <a href="#">Veículos</a>
      <a href="#">Contato</a>
      <div id="user-container">
        <button class="login-header" onclick="window.location.href='../index.html'">Entrar</button>
      </div>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>Alugue carros premium em segundos</h1>
      <p>Experiência premium, veículos esportivos e tecnologia moderna.</p>

      <div class="search-box" style="grid-template-columns: repeat(3, 1fr);">
        <div class="search-input">
          <label>Região</label>
          <select id="regiao-select">
            <option value="">Selecione uma região</option>
            <option value="MG">Minas Gerais (MG)</option>
            <option value="SP">São Paulo (SP)</option>
          </select>
        </div>
        <div class="search-input">
          <label>Agência de Retirada</label>
          <select id="retirada-select" disabled><option value="">Escolha a região primeiro</option></select>
        </div>
        <div class="search-input">
          <label>Agência de Devolução</label>
          <select id="devolucao-select" disabled><option value="">Escolha a região primeiro</option></select>
        </div>
        <div class="search-input"><label>Retirada</label><input type="date"></div>
        <div class="search-input"><label>Devolução</label><input type="date"></div>
        <button class="search-btn" style="height: 60px; margin-top: 25px;"><i class="fa-solid fa-magnifying-glass"></i> Buscar</button>
      </div>
    </div>
  </section>

  <section class="info-bar">
    <div class="info-item"><i class="fa-solid fa-shield-halved"></i> Segurança premium</div>
    <div class="info-item"><i class="fa-solid fa-car"></i> Frota esportiva</div>
    <div class="info-item"><i class="fa-solid fa-bolt"></i> Reserva instantânea</div>
  </section>

  <section class="cars-section">
    <div class="section-title">
      <h2>Disponíveis Hoje</h2>
      <p>Os carros mais procurados da Nitro Black</p>
    </div>

    <div class="cars-grid" id="cars-grid">
      <p style="text-align: center; width: 100%; color: white;">Carregando frota...</p>
    </div>
  </section>

  <script src="../script/js/script.js"></script>

</body>
</html>
