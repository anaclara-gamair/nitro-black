<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Contato | NitroBlack</title>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <!-- USA O CSS DA HOME -->
    <link rel="stylesheet" href="../css/home.css">

    <style>

        .contact-container{

            padding:120px 8%;

        }

        .contact-box{

            max-width:900px;

            margin:0 auto;

            background:rgba(14, 0, 30, 0.82);

            border:1px solid rgba(255,255,255,0.08);

            backdrop-filter:blur(18px);

            border-radius:30px;

            padding:40px;

            box-shadow:
            0 0 40px rgba(123,44,255,0.2);

        }

        .contact-header{

            text-align:center;

            margin-bottom:40px;

        }

        .contact-header h2{

            font-size:48px;

            margin-bottom:10px;

        }

        .contact-header p{

            color:#c9b6e4;

        }

        .contact-form{

            display:grid;

            grid-template-columns:1fr 1fr;

            gap:20px;

        }

        .full-width{

            grid-column:1/3;

        }

        .contact-form textarea{

            min-height:180px;

            resize:none;

            padding:20px;

            border:none;

            outline:none;

            border-radius:18px;

            background:rgba(255,255,255,0.05);

            border:1px solid rgba(255,255,255,0.08);

            color:white;

        }

        .contact-form textarea:focus{

            border-color:#bb86fc;

            box-shadow:
            0 0 20px rgba(187,134,252,0.25);

        }

        .contact-btn{

            height:60px;

            border:none;

            border-radius:20px;

            background:
            linear-gradient(90deg,#7b2cff,#bb86fc);

            color:white;

            font-size:18px;

            font-weight:600;

            cursor:pointer;

            transition:0.3s;

        }

        .contact-btn:hover{

            transform:scale(1.02);

            box-shadow:
            0 0 30px #8b5cf6;

        }

        .support-grid{

            margin-top:35px;

            display:grid;

            grid-template-columns:repeat(3,1fr);

            gap:20px;

        }

        .support-card{

            background:rgba(255,255,255,0.04);

            border:1px solid rgba(255,255,255,0.08);

            border-radius:22px;

            padding:25px;

            text-align:center;

        }

        .support-card i{

            font-size:28px;

            color:#bb86fc;

            margin-bottom:15px;

        }

        .support-card h3{

            margin-bottom:8px;

        }

        .support-card p{

            color:#c9b6e4;

            font-size:14px;

        }

        @media(max-width:900px){

            .support-grid{

                grid-template-columns:1fr;

            }

        }

        @media(max-width:768px){

            .contact-form{

                grid-template-columns:1fr;

            }

            .full-width{

                grid-column:auto;

            }

            .contact-header h2{

                font-size:38px;

            }

        }

    </style>

</head>

<body>

    <!-- GLOW -->

    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <!-- HEADER -->

    <header class="header">

        <div class="logo">
            Nitro<span>Black</span>
        </div>

        <nav class="nav">

            <a href="home.html">Home</a>



            <a href="contato.html">Contato</a>

            <button class="login-header">
                Suporte
            </button>

        </nav>

    </header>

    <!-- HERO -->

    <section class="hero">

        <div class="hero-content">

            <h1>
                Central de Atendimento
            </h1>

            <p>
                Tire dúvidas, envie sugestões ou relate problemas para nossa equipe.
            </p>

        </div>

    </section>

    <!-- CONTATO -->

    <section class="contact-container">

        <div class="contact-box">

            <div class="contact-header">

                <h2>Fale Conosco</h2>

                <p>
                    Nossa equipe responderá o mais rápido possível.
                </p>

            </div>

            <form class="contact-form">

                <div class="search-input">

                    <label>Nome</label>

                    <input
                        type="text"
                        placeholder="Digite seu nome"
                    >

                </div>

                <div class="search-input">

                    <label>Email</label>

                    <input
                        type="email"
                        placeholder="Digite seu email"
                    >

                </div>

                <div class="search-input full-width">

                    <label>Assunto</label>

                    <input
                        type="text"
                        placeholder="Ex: Problema na reserva"
                    >

                </div>

                <div class="search-input full-width">

                    <label>Mensagem</label>

                    <textarea
                        placeholder="Digite aqui sua mensagem..."
                    ></textarea>

                </div>

                <button class="contact-btn full-width">

                    <i class="fa-solid fa-paper-plane"></i>

                    Enviar Feedback

                </button>

            </form>

            <!-- INFO -->

            <div class="support-grid">

                <div class="support-card">

                    <i class="fa-solid fa-clock"></i>

                    <h3>Atendimento</h3>

                    <p>
                        Das 09h às 21h
                    </p>

                </div>

                <div class="support-card">

                    <i class="fa-solid fa-envelope"></i>

                    <h3>Email</h3>

                    <p>
                        suporte@nitroblack.com
                    </p>

                </div>

                <div class="support-card">

                    <i class="fa-solid fa-bolt"></i>

                    <h3>Resposta rápida</h3>

                    <p>
                        Média de 15 minutos
                    </p>

                </div>

            </div>

        </div>

    </section>

</body>
</html>
